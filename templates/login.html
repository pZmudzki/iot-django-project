<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie · IoT Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c0f; --surface: #111318; --border: #1e2330;
            --green: #00ff88; --green-dim: #00ff8833;
            --red: #ff3355; --red-dim: #ff335522;
            --amber: #ffaa00;
            --text: #c8d0e0; --muted: #4a5568;
            --mono: 'Share Tech Mono', monospace;
            --sans: 'Rajdhani', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text);
            font-family: var(--sans); min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background-image: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(255,255,255,0.012) 2px, rgba(255,255,255,0.012) 4px);
        }
        .login-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 4px; width: 100%; max-width: 360px;
            overflow: hidden; animation: fadeUp .5s ease both;
        }
        .login-header {
            text-align: center; padding: 2rem 1.5rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .login-header .label {
            font-family: var(--mono); font-size: .65rem;
            letter-spacing: .25em; color: var(--muted);
            text-transform: uppercase; margin-bottom: .4rem;
        }
        .login-header h1 {
            font-size: 1.8rem; font-weight: 700;
            letter-spacing: .08em; text-transform: uppercase; color: #fff;
        }
        .login-header h1 span { color: var(--green); }
        .login-body { padding: 1.5rem; }
        .field { margin-bottom: 1rem; }
        .field label {
            display: block; font-family: var(--mono); font-size: .65rem;
            letter-spacing: .15em; color: var(--muted);
            text-transform: uppercase; margin-bottom: .4rem;
        }
        .field input {
            width: 100%; background: var(--bg); border: 1px solid var(--border);
            border-radius: 3px; color: var(--text);
            font-family: var(--sans); font-size: .95rem;
            padding: .65rem 1rem; outline: none; transition: border-color .2s;
        }
        .field input:focus { border-color: var(--amber); }
        .btn-login {
            width: 100%; padding: .8rem; margin-top: .5rem;
            border: 1px solid var(--green); border-radius: 3px;
            background: transparent; color: var(--green);
            font-family: var(--mono); font-size: .8rem;
            letter-spacing: .15em; text-transform: uppercase;
            cursor: pointer; transition: all .2s;
        }
        .btn-login:hover { background: var(--green-dim); box-shadow: 0 0 16px var(--green-dim); }
        .error-msg {
            background: var(--red-dim); border: 1px solid var(--red);
            color: var(--red); border-radius: 3px; padding: .55rem 1rem;
            font-family: var(--mono); font-size: .75rem; margin-bottom: 1rem;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-header">
        <div class="label">Raspberry Pi · IoT</div>
        <h1>IoT <span>Panel</span></h1>
    </div>
    <div class="login-body">
        {% if form.errors %}
        <div class="error-msg">Nieprawidłowa nazwa użytkownika lub hasło.</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="field">
                <label for="id_username">Użytkownik</label>
                <input type="text" name="username" id="id_username"
                       placeholder="Nazwa użytkownika" autofocus required>
            </div>
            <div class="field">
                <label for="id_password">Hasło</label>
                <input type="password" name="password" id="id_password"
                       placeholder="••••••••" required>
            </div>
            {% if next %}
            <input type="hidden" name="next" value="{{ next }}">
            {% endif %}
            <button type="submit" class="btn-login">▶ Zaloguj się</button>
        </form>
    </div>
</div>
</body>
</html>
