<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sterowanie Diodą LED</title>
    <style>
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: #1a1a2e;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #16213e;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 {
            margin-top: 0;
            color: #0f3460;
            color: #e94560;
        }
        .status {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            padding: 1rem;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
        }
        .status span {
            font-weight: bold;
        }
        .status-on {
            color: #4CAF50;
        }
        .status-off {
            color: #f44336;
        }
        form {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        button {
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            color: white;
            font-weight: 600;
        }
        button:active {
            transform: scale(0.95);
        }
        .btn-on {
            background: #4CAF50;
        }
        .btn-on:hover {
            background: #45a049;
        }
        .btn-off {
            background: #f44336;
        }
        .btn-off:hover {
            background: #d32f2f;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sterowanie LED na Raspberry Pi</h1>
        
        <div class="status">
            Obecny stan diody: <span class="{% if status == 'Włączona' %}status-on{% else %}status-off{% endif %}">{{ status }}</span>
        </div>

        <form method="POST">
            {% csrf_token %}
            <button type="submit" name="action" value="on" class="btn-on">Włącz</button>
            <button type="submit" name="action" value="off" class="btn-off">Wyłącz</button>
        </form>
    </div>
</body>
</html>
